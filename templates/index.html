 <!DOCTYPE html>
<html>
<head>
    <title>Tripmakur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="header">
    <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Tripmakur Logo">
    <p class="tagline">The smarter way to find your next destination</p>
</header>

<main class="hero">
    <section class="card">
        <h1>Let’s find your perfect getaway</h1>
        <p class="subtitle">Answer a few questions and Tripmakur will suggest vacation ideas based on your style, budget, and travel distance.</p>

        <form action="/results" method="POST" class="form-grid">

            <div class="form-group full">
                <label>Starting city</label>
                <input type="text" name="home_city" placeholder="Example: Memphis, TN" required>
            </div>

            <div class="form-group">
                <label>Trip type</label>
                <select name="trip_length">
                    <option value="weekend">Weekend Trip</option>
                    <option value="week">Full Vacation</option>
                </select>
            </div>

            <div class="form-group">
                <label>Driving distance</label>
                <select name="drive_hours">
                    <option value="3">Up to 3 hours</option>
                    <option value="5">Up to 5 hours</option>
                    <option value="7">Up to 7 hours</option>
                    <option value="10">Up to 10 hours</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vacation type</label>
                <select name="trip_type">
                    <option value="beach">Beach</option>
                    <option value="mountain">Mountains / Cabin</option>
                    <option value="city">City / Nightlife</option>
                    <option value="family">Theme Parks / Family Fun</option>
                </select>
            </div>

            <div class="form-group">
                <label>Who is going?</label>
                <select name="travel_style">
                    <option value="couple">Couple</option>
                    <option value="family">Family</option>
                    <option value="friends">Friends</option>
                    <option value="solo">Solo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Budget</label>
                <select name="budget">
                    <option value="low">Budget Friendly</option>
                    <option value="medium">Moderate</option>
                    <option value="high">Higher Budget</option>
                </select>
            </div>

            <div class="form-group">
                <label>Where have you traveled before?</label>
                <input type="text" name="past_destination" placeholder="Orlando, Cancun, Nashville">
            </div>

            <div class="form-group">
                <label>Favorite past destination</label>
                <input type="text" name="favorite_destination" placeholder="Example: Destin, Florida">
            </div>

            <div class="form-group full">
                <label>Why was it your favorite?</label>
                <textarea name="favorite_reason" placeholder="Example: beaches, food, relaxing, family activities"></textarea>
            </div>

            <div class="form-group full">
                <button type="submit">Find My Trip</button>
            </div>

        </form>
    </section>
</main>

</body>
</html>
